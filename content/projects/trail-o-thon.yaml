summary: >-
  End-to-end event branding and merchandise for Trail O Thon, a trail marathon
  set in the Aravalli hills, built around a single creative theme that turned
  the terrain's contour lines into a complete visual identity across every race
  day touchpoint.
challenge: >-
  Trail O Thon needed more than a logo and a colour palette. As a trail marathon
  set against the raw, dramatic landscape of the Aravali Hills, it required a
  cohesive brand world that could live across an expo booth, a finish line
  stage, race bibs, km markers, recovery zones, signage, certificates, and
  merchandise, all while feeling like it belonged to the hills it was run
  through.
insight: >-
  The Aravalli hills have their own visual language, one that cartographers have
  been drawing for centuries. Contour lines don't just describe elevation; they
  describe effort. Every line a runner crosses on the map is a line they climb
  with their legs. That relationship between the drawn landscape and the lived
  experience became the foundation for everything.
approach: >-
  Developed 'Run the Contours' as the event theme, a creative direction that
  extracted the topographic contour lines of the Aravalli terrain and built an
  entire visual system around them. From theme creation through to execution,
  the contour graphic scaled across every touchpoint: expo booth design, race
  day stage, finish line, km cards, bib design, lanyards, certificates, recovery
  zone, and merchandise. Each element was treated as part of a single continuous
  landscape, so the brand felt unified whether a runner encountered it at
  registration or at the finish line.
outcome: >-
  A fully realised event brand that gave Trail O Thon a distinct identity rooted
  in its geography, creating a race day experience where the design and the
  terrain spoke the same language, and every touchpoint felt like it had been
  built for these specific hills.
