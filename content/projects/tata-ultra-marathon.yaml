summary: >-
  A race identity and apparel collection for the Tata Ultra Marathon in
  Lonavala, translating the elevation and terrain of the 50km and 35km routes
  into a premium topographic design system.
challenge: >-
  The Tata Ultra Marathon needed a visual identity that could hold its own
  against the scale and drama of the Lonavala landscape. Generic race branding
  would not do justice to a course defined by its hills, its gradient, and the
  physical and mental journey runners undertake across two gruelling distances.
insight: >-
  The course itself is the story. Every climb and descent that runners endure is
  data, elevation data that, when visualised, becomes a fingerprint unique to
  this race and this place. The most authentic identity was already written into
  the terrain.
approach: >-
  Developed TopoFlow: a design language that converts the actual elevation
  profiles of the 50km and 35km routes into layered contour lines. The rising
  and falling terrain is abstracted into a fluid, modern graphic system that
  moves across apparel and collateral with the same rhythm as the race.
  Lonavala's hilly geography is not a backdrop; it is the primary visual
  element, redrawn as a premium identity rooted directly in the landscape
  runners will conquer.
outcome: >-
  A cohesive race identity that feels as demanding and distinctive as the course
  itself, giving the Tata Ultra Marathon a visual language that communicates
  challenge, place, and prestige across every runner and spectator touchpoint.
