slug: Goa IronMan
category: Performance Apparel
coverImage: /projects/goa-ironman/coverImage.jpg
featured: true
order: 2
summary: >-
  A wearable art collection for Goa IRONMAN, translating the spirit of Goa and
  the grit of triathlon into a doodle-led design system across a tri-suit,
  cycling jersey, and branded merchandise.
challenge: >-
  Goa IRONMAN needed apparel that went beyond race-day function. The existing
  kit lacked a distinct visual identity rooted in place, nothing told the story
  of Goa, the course, or the culture that makes this race unlike any other on
  the circuit.
insight: >-
  Athletes wear their race. The kit is the first and last thing they see in the
  water, on the road, and at the finish line. When the design carries the soul
  of the place, it stops being gear and becomes a memento of the experience
  itself.
approach: >-
  Built a unified design language around Goa's layered identity, its coastline,
  colonial architecture, tropical landscape, and festival colour. Doodle art
  rendered as aerial perspectives across each garment, with each piece narrating
  a different leg of the race. The tri-suit maps the full course from Miramar
  Beach to the finish; the cycling jersey captures Goa's back roads and
  Portuguese tile heritage; merchandise extends key motifs into everyday objects
  through isolated, enlarged detail work.
outcome: >-
  A cohesive apparel and merchandise collection that functions as a visual
  celebration of Goa as much as the race itself, giving athletes, spectators,
  and supporters a piece of the experience they carry well beyond race day.
