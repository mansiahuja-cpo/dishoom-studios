summary: >-
  A full apparel kit and two race jersey designs for the Tata Steel 25K
  marathon, each jersey a distinct creative statement built around movement,
  momentum, and the prestige of one of India's most recognised road races.
challenge: >-
  The Tata Steel 25K is a marquee event. The apparel needed to match that
  stature, not just function as race kit, but feel like a collector's piece that
  participants would wear long after crossing the finish line. Two jersey
  designs meant two distinct visual ideas had to coexist within the same kit
  without competing.
insight: >-
  A race jersey is worn at the peak of human effort. The design should feel like
  it's already moving, like it was made for the moment a runner hits their
  stride, not the moment they're standing still at the start line.
approach: >-
  Developed two hero jersey concepts, each with its own creative identity. The
  first, Momentum in Motion, centres on a bold abstract '25' that swirls across
  the fabric in fluid, energetic lines, the number becomes the motion,
  commanding the front panel and sweeping dynamically around the back. The
  second, Rise in Motion, takes a different direction: a cascading wave of blue
  hues surging upward, channelling ascent and transformation through abstract
  form. Both designs were carried through into a complete apparel kit, creating
  a unified race day wardrobe with two distinct personalities at its core.
outcome: >-
  An apparel collection that elevates the Tata Steel 25K beyond race kit into
  wearable commemoration, two jerseys that capture the energy of the event from
  different angles, unified by the same belief that what you wear on race day
  should feel as significant as the race itself.
